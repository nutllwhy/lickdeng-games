<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏎️ 3D赛车竞速</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            background: #000;
            font-family: 'PingFang SC', sans-serif;
        }
        #gameCanvas { display: block; }
        #ui {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 100;
        }
        .hud {
            background: rgba(0,0,0,0.7);
            padding: 15px 25px;
            border-radius: 10px;
            color: #fff;
            font-size: 1.2rem;
            border: 2px solid rgba(255,255,255,0.2);
        }
        .hud span { color: #00ff88; font-weight: bold; }
        #startScreen, #gameOverScreen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }
        #startScreen h1, #gameOverScreen h1 {
            font-size: 4rem;
            background: linear-gradient(90deg, #ff6b6b, #feca57, #48dbfb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }
        .btn {
            padding: 18px 50px;
            font-size: 1.3rem;
            background: linear-gradient(135deg, #00ff88, #00d2ff);
            border: none;
            border-radius: 30px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            margin: 10px;
            transition: transform 0.3s;
        }
        .btn:hover { transform: scale(1.1); }
        .controls-hint {
            margin-top: 30px;
            color: #888;
            text-align: center;
        }
        .controls-hint kbd {
            background: rgba(255,255,255,0.1);
            padding: 5px 15px;
            border-radius: 5px;
            margin: 0 5px;
        }
        #speedBar {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            height: 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            overflow: hidden;
        }
        #speedFill {
            height: 100%;
            background: linear-gradient(90deg, #00ff88, #feca57, #ff6b6b);
            width: 0%;
            transition: width 0.1s;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="startScreen">
        <h1>🏎️ 3D赛车竞速</h1>
        <p style="color:#888;margin-bottom:30px;">躲避障碍，收集金币，跑得更远！</p>
        <button class="btn" onclick="startGame()">开始游戏</button>
        <div class="controls-hint">
            <p>操作说明：</p>
            <kbd>←</kbd> <kbd>→</kbd> 左右移动<br><br>
            <kbd>↑</kbd> 加速 | <kbd>↓</kbd> 减速
        </div>
    </div>
    <div id="gameOverScreen" class="hidden">
        <h1>游戏结束！</h1>
        <p class="hud" style="margin:20px;">得分: <span id="finalScore">0</span></p>
        <button class="btn" onclick="restartGame()">再来一局</button>
    </div>
    <div id="ui">
        <div class="hud">得分: <span id="score">0</span></div>
        <div class="hud">速度: <span id="speed">0</span> km/h</div>
    </div>
    <div id="speedBar"><div id="speedFill"></div></div>
    <canvas id="gameCanvas"></canvas>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // 游戏变量
        let scene, camera, renderer;
        let player, road;
        let obstacles = [];
        let coins = [];
        let score = 0;
        let speed = 0;
        let maxSpeed = 2;
        let gameRunning = false;
        let playerX = 0;
        let roadLines = [];
        
        // 初始化
        function init() {
            // 场景
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x000011, 50, 200);
            
            // 相机
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 8, 15);
            camera.lookAt(0, 0, -20);
            
            // 渲染器
            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('gameCanvas'), antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearColor(0x000011);
            
            // 灯光
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);
            
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(10, 20, 10);
            scene.add(dirLight);
            
            // 地面（公路）
            createRoad();
            
            // 玩家赛车
            createPlayer();
            
            // 装饰物
            createDecorations();
            
            // 事件监听
            window.addEventListener('resize', onWindowResize);
            document.addEventListener('keydown', onKeyDown);
            
            animate();
        }
        
        function createRoad() {
            // 主公路
            const roadGeo = new THREE.PlaneGeometry(20, 500);
            const roadMat = new THREE.MeshPhongMaterial({ color: 0x333344 });
            road = new THREE.Mesh(roadGeo, roadMat);
            road.rotation.x = -Math.PI / 2;
            road.position.z = -200;
            scene.add(road);
            
            // 公路边
            for (let i = -1; i <= 1; i += 2) {
                const edgeGeo = new THREE.BoxGeometry(1, 0.5, 500);
                const edgeMat = new THREE.MeshPhongMaterial({ color: 0xff6b6b });
                const edge = new THREE.Mesh(edgeGeo, edgeMat);
                edge.position.set(i * 10.5, 0.25, -200);
                scene.add(edge);
            }
            
            // 道路线
            for (let i = 0; i < 20; i++) {
                const lineGeo = new THREE.PlaneGeometry(0.3, 8);
                const lineMat = new THREE.MeshBasicMaterial({ color: 0xffff00 });
                const line = new THREE.Mesh(lineGeo, lineMat);
                line.rotation.x = -Math.PI / 2;
                line.position.set(0, 0.01, -i * 25);
                scene.add(line);
                roadLines.push(line);
            }
        }
        
        function createPlayer() {
            // 车身
            const bodyGeo = new THREE.BoxGeometry(2, 1, 4);
            const bodyMat = new THREE.MeshPhongMaterial({ color: 0x00ff88, shininess: 100 });
            player = new THREE.Group();
            
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.position.y = 0.5;
            player.add(body);
            
            // 车顶
            const topGeo = new THREE.BoxGeometry(1.5, 0.8, 2);
            const topMat = new THREE.MeshPhongMaterial({ color: 0x00cc66 });
            const top = new THREE.Mesh(topGeo, topMat);
            top.position.set(0, 1.4, -0.3);
            player.add(top);
            
            // 轮子
            const wheelGeo = new THREE.CylinderGeometry(0.4, 0.4, 0.3, 16);
            const wheelMat = new THREE.MeshPhongMaterial({ color: 0x222222 });
            const wheelPositions = [
                [-1, 0.4, 1.2], [1, 0.4, 1.2],
                [-1, 0.4, -1.2], [1, 0.4, -1.2]
            ];
            wheelPositions.forEach(pos => {
                const wheel = new THREE.Mesh(wheelGeo, wheelMat);
                wheel.rotation.z = Math.PI / 2;
                wheel.position.set(...pos);
                player.add(wheel);
            });
            
            // 车灯
            const lightGeo = new THREE.BoxGeometry(0.4, 0.2, 0.1);
            const lightMat = new THREE.MeshBasicMaterial({ color: 0xffff00 });
            [[-0.6, 0.5, 2], [0.6, 0.5, 2]].forEach(pos => {
                const light = new THREE.Mesh(lightGeo, lightMat);
                light.position.set(...pos);
                player.add(light);
            });
            
            // 尾灯
            const tailGeo = new THREE.BoxGeometry(0.3, 0.2, 0.1);
            const tailMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
            [[-0.7, 0.5, -2], [0.7, 0.5, -2]].forEach(pos => {
                const tail = new THREE.Mesh(tailGeo, tailMat);
                tail.position.set(...pos);
                player.add(tail);
            });
            
            player.position.y = 0;
            player.position.z = 0;
            scene.add(player);
        }
        
        function createDecorations() {
            // 路边建筑
            for (let i = 0; i < 40; i++) {
                const height = 5 + Math.random() * 15;
                const geo = new THREE.BoxGeometry(4 + Math.random() * 4, height, 4 + Math.random() * 4);
                const mat = new THREE.MeshPhongMaterial({ color: 0x222233 + Math.random() * 0x111111 });
                const building = new THREE.Mesh(geo, mat);
                building.position.set(
                    (Math.random() > 0.5 ? 1 : -1) * (12 + Math.random() * 10),
                    height / 2,
                    -i * 15 - Math.random() * 10
                );
                scene.add(building);
            }
            
            // 星星/背景
            for (let i = 0; i < 200; i++) {
                const starGeo = new THREE.SphereGeometry(0.2 + Math.random() * 0.3);
                const starMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
                const star = new THREE.Mesh(starGeo, starMat);
                star.position.set(
                    (Math.random() - 0.5) * 200,
                    Math.random() * 50 + 10,
                    -Math.random() * 300
                );
                scene.add(star);
            }
        }
        
        function spawnObstacle() {
            if (!gameRunning) return;
            
            if (Math.random() < 0.03) {
                const type = Math.random();
                let obstacle;
                
                if (type < 0.5) {
                    // 车辆障碍
                    const carGeo = new THREE.BoxGeometry(2, 1.5, 4);
                    const carMat = new THREE.MeshPhongMaterial({ color: 0xff4444 + Math.random() * 0x444444 });
                    obstacle = new THREE.Mesh(carGeo, carMat);
                    obstacle.position.y = 0.75;
                } else {
                    // 石头障碍
                    const rockGeo = new THREE.DodecahedronGeometry(1);
                    const rockMat = new THREE.MeshPhongMaterial({ color: 0x666666 });
                    obstacle = new THREE.Mesh(rockGeo, rockMat);
                    obstacle.position.y = 1;
                }
                
                obstacle.position.x = (Math.random() - 0.5) * 14;
                obstacle.position.z = -100;
                obstacle.userData = { type: 'obstacle' };
                scene.add(obstacle);
                obstacles.push(obstacle);
            }
            
            // 生成金币
            if (Math.random() < 0.02) {
                const coinGeo = new THREE.TorusGeometry(0.8, 0.2, 8, 16);
                const coinMat = new THREE.MeshPhongMaterial({ color: 0xffd700, shininess: 100 });
                const coin = new THREE.Mesh(coinGeo, coinMat);
                coin.position.x = (Math.random() - 0.5) * 14;
                coin.position.y = 1.5;
                coin.position.z = -100;
                coin.userData = { type: 'coin' };
                scene.add(coin);
                coins.push(coin);
            }
        }
        
        function updateGame() {
            if (!gameRunning) return;
            
            // 玩家移动
            player.position.x = playerX;
            player.rotation.z = -playerX * 0.1;
            
            // 加速
            if (speed < maxSpeed) speed += 0.01;
            
            // 道路线移动
            roadLines.forEach(line => {
                line.position.z += speed;
                if (line.position.z > 10) line.position.z -= 500;
            });
            
            // 障碍物移动
            obstacles.forEach((obs, i) => {
                obs.position.z += speed;
                
                // 碰撞检测
                const dx = Math.abs(obs.position.x - player.position.x);
                const dz = Math.abs(obs.position.z - player.position.z);
                if (dx < 2 && dz < 3) {
                    gameOver();
                }
                
                if (obs.position.z > 20) {
                    scene.remove(obs);
                    obstacles.splice(i, 1);
                }
            });
            
            // 金币收集
            coins.forEach((coin, i) => {
                coin.position.z += speed;
                coin.rotation.y += 0.1;
                
                const dx = Math.abs(coin.position.x - player.position.x);
                const dz = Math.abs(coin.position.z - player.position.z);
                if (dx < 2 && dz < 3) {
                    score += 100;
                    scene.remove(coin);
                    coins.splice(i, 1);
                }
                
                if (coin.position.z > 20) {
                    scene.remove(coin);
                    coins.splice(i, 1);
                }
            });
            
            // 持续得分
            score += speed * 0.1;
            
            // 生成新障碍
            spawnObstacle();
            
            // 更新UI
            document.getElementById('score').textContent = Math.floor(score);
            document.getElementById('speed').textContent = Math.floor(speed * 100);
            document.getElementById('speedFill').style.width = (speed / maxSpeed * 100) + '%';
        }
        
        function animate() {
            requestAnimationFrame(animate);
            updateGame();
            renderer.render(scene, camera);
        }
        
        function startGame() {
            document.getElementById('startScreen').classList.add('hidden');
            gameRunning = true;
            score = 0;
            speed = 0.5;
            playerX = 0;
            player.position.x = 0;
        }
        
        function gameOver() {
            gameRunning = false;
            document.getElementById('finalScore').textContent = Math.floor(score);
            document.getElementById('gameOverScreen').classList.remove('hidden');
        }
        
        function restartGame() {
            // 清除障碍
            obstacles.forEach(obs => scene.remove(obs));
            coins.forEach(coin => scene.remove(coin));
            obstacles = [];
            coins = [];
            
            document.getElementById('gameOverScreen').classList.add('hidden');
            startGame();
        }
        
        function onKeyDown(e) {
            if (!gameRunning) return;
            
            switch(e.key) {
                case 'ArrowLeft':
                case 'a':
                    playerX = Math.max(playerX - 0.8, -7);
                    break;
                case 'ArrowRight':
                case 'd':
                    playerX = Math.min(playerX + 0.8, 7);
                    break;
                case 'ArrowUp':
                case 'w':
                    maxSpeed = Math.min(maxSpeed + 0.1, 3);
                    break;
                case 'ArrowDown':
                case 's':
                    maxSpeed = Math.max(maxSpeed - 0.1, 0.5);
                    break;
            }
        }
        
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        init();
    </script>
</body>
</html>
